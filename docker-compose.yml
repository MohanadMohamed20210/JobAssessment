version: "3.9"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - HEADLESS=true
      - APPIUM_SERVER_URL=http://host.docker.internal:4723
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./screenshots:/app/screenshots
    restart: unless-stopped
